# =============================================================
# TEST-ONLY configuration
# These keys are used exclusively for unit/slice tests.
# They have NO value outside of tests — do NOT use in any
# deployed environment.
# =============================================================

app.frontend-url=http://localhost:5173

app.jwt.issuer=keybudget-api
app.jwt.audience=keybudget

# TEST-ONLY RSA keypair — different from dev/prod keys
app.jwt.private-
app.jwt.public-

# TEST-ONLY AES key — different from dev/prod keys
app.encryption.key=GJdlgmAx9FG/i9BRayd9TTeVzqHUKMX6MQdLPs2R1wM=

# Datasource (H2 in-memory for tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Flyway for tests — H2 schema managed by Hibernate
spring.flyway.enabled=false

# Required by AuthController — secure flag must be false in test (no HTTPS)
app.cookie.secure=false

# Required by AuthController + JwtServiceImpl — 7 days in seconds
app.refresh-token.max-age-seconds=604800
