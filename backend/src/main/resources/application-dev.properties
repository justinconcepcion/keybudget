# =============================================
# DEV profile — H2 in-memory DB
# =============================================
# Set secrets via environment variables or a .env file.
# See README or CLAUDE.md for setup instructions.

# Database (H2)
spring.datasource.url=jdbc:h2:mem:keybudget;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Frontend URL
app.frontend-url=http://localhost:5173

# Google OAuth2 — set these env vars from your Google Cloud Console credentials
# https://console.cloud.google.com -> APIs & Services -> Credentials
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:5173/login/oauth2/code/google

# JWT RSA keys — generate with: scripts/generate-keys.sh
# Set as env vars: JWT_PRIVATE_KEY, JWT_PUBLIC_KEY (base64-encoded)
app.jwt.private-key=${JWT_PRIVATE_KEY}
app.jwt.public-key=${JWT_PUBLIC_KEY}

# AES-256 encryption key — generate with: openssl rand -base64 32
app.encryption.key=${ENCRYPTION_KEY}

# Cookie security — false for localhost (browsers reject Secure cookies over HTTP)
app.cookie.secure=false

# Logging
logging.level.com.keybudget=DEBUG
logging.level.org.springframework.security=INFO
