# =============================================
# DEV profile — H2 in-memory DB, Plaid sandbox
# =============================================

# Database (H2)
spring.datasource.url=jdbc:h2:mem:keybudget;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Frontend URL
app.frontend-url=http://localhost:5173

# Google OAuth2 — replace with your credentials from Google Cloud Console
# https://console.cloud.google.com → APIs & Services → Credentials
spring.security.oauth2.client.registration.google.client-id=REPLACE_ME
spring.security.oauth2.client.registration.google.client-secret=REPLACE_ME
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# JWT RSA keys — generate with: scripts/generate-keys.sh
# Paste base64-encoded PKCS8 private key and X509 public key below
app.jwt.private-key=REPLACE_ME
app.jwt.public-key=REPLACE_ME

# AES-256 encryption key — generate with: openssl rand -base64 32
app.encryption.key=REPLACE_ME

# Logging
logging.level.com.keybudget=DEBUG
logging.level.org.springframework.security=DEBUG
