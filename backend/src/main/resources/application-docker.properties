# =============================================
# DOCKER profile — PostgreSQL in Docker Compose
# =============================================
# Activated by: SPRING_PROFILES_ACTIVE=docker in docker-compose.yml
# Secrets provided via .env file (see .env.example)

# Database (PostgreSQL via Docker Compose)
spring.datasource.url=jdbc:postgresql://postgres:5432/keybudget
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:keybudget}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true

# Frontend URL (browser accesses localhost, not Docker network)
app.frontend-url=http://localhost:5173

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:not-configured}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:not-configured}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:5173/login/oauth2/code/google

# JWT RSA keys
app.jwt.private-key=${JWT_PRIVATE_KEY}
app.jwt.public-key=${JWT_PUBLIC_KEY}

# AES-256 encryption key
app.encryption.key=${ENCRYPTION_KEY}

# JWT claim validation
app.jwt.issuer=keybudget-api
app.jwt.audience=keybudget

# Cookie security — false for localhost
app.cookie.secure=false

# Request size limits
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=1MB
server.tomcat.max-http-form-post-size=1048576
server.tomcat.max-swallow-size=1048576

# Logging
logging.level.com.keybudget=DEBUG

# Integration APIs (public, no auth required)
integration.bitcoin.blockstream-url=https://blockstream.info/api
integration.coingecko.price-url=https://api.coingecko.com/api/v3/simple/price
integration.coinbase.api-url=https://api.coinbase.com
integration.coinbase.api-version=2024-01-01
integration.plaid.client-id=${PLAID_CLIENT_ID:not-configured}
integration.plaid.secret=${PLAID_SECRET:not-configured}
integration.plaid.env=sandbox
