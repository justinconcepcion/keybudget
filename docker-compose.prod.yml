services:
  postgres:
    image: postgres:16-alpine
    container_name: keybudget-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keybudget
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d keybudget"]
      interval: 10s
      timeout: 3s
      retries: 5
    # Not exposed to host — only backend can reach it via Docker network

  backend:
    build:
      context: ./backend
      target: prod
    container_name: keybudget-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/keybudget
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    # Not exposed to host — Nginx proxies to it

  frontend:
    build:
      context: ./frontend
      target: prod
    container_name: keybudget-ui
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-443}:443"
      - "${HOST_PORT_HTTP:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  pgdata:
